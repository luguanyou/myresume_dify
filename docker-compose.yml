services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SERVICE_NAME: ${SERVICE_NAME:-portfolio-api}
      API_VERSION: ${API_VERSION:-1.0}
      API_TITLE: ${API_TITLE:-AI Resume Portfolio API}
      CORS_ORIGINS: ${DOCKER_CORS_ORIGINS:-http://localhost:8080}
      DIFY_API_BASE_URL: ${DIFY_API_BASE_URL:-https://api.dify.ai/v1}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      MYSQL_HOST: ${DOCKER_MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-portfolio}
      MYSQL_USER: ${MYSQL_USER:-portfolio_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-}
      ADMIN_TOKEN_EXPIRE_SECONDS: ${ADMIN_TOKEN_EXPIRE_SECONDS:-86400}
      UPLOAD_DIR: /app/uploads
      PUBLIC_UPLOAD_BASE_URL: /uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/uploads:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
