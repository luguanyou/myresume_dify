services:
  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    env_file:
      - ./.env
    restart: unless-stopped
    environment:
      SERVICE_NAME: ${SERVICE_NAME:-portfolio-api}
      API_VERSION: ${API_VERSION:-1.0}
      API_TITLE: ${API_TITLE:-AI Resume Portfolio API}
      APP_ROOT_PATH: ${APP_ROOT_PATH:-/dify}
      CORS_ORIGINS: ${DOCKER_CORS_ORIGINS:-http://localhost:8180}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-portfolio}
      MYSQL_USER: ${MYSQL_USER:-portfolio_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-portfolio_password}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-}
      ADMIN_TOKEN_EXPIRE_SECONDS: ${ADMIN_TOKEN_EXPIRE_SECONDS:-86400}
      UPLOAD_DIR: /app/uploads
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/dify/api}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-/dify/uploads}
    volumes:
      - ./backend/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/dify/api}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/dify/}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8180}:80"
    depends_on:
      backend:
        condition: service_healthy
